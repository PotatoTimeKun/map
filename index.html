<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>すしすきーマイクラサーバ マップ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      position: relative;
      padding: 0;
      margin: 0;
    }

    #map {
      height: 90vh;
    }
  </style>
  <link rel="icon" href="fav.png" type="image/png">
</head>

<body>
  <button id="toggleRailway">線路の表示/非表示</button>

  <input type="text" id="markerSearch" placeholder="建物名・地域名を検索" />
  <ul id="searchResults"></ul>

  <style>
    #toggleRailway {
      position: absolute;
      z-index: 1000;
      bottom: 10px;
      left: 5px;
      display: inline-block;
      padding: 0.5em 1em;
      text-decoration: none;
      background: #f7f7f7;
      border: 0px;
      border-left: solid 6px #ff7c5c;
      color: #ff7c5c;
      font-weight: bold;
      box-shadow: 0px 2px 2px rgba(0, 0, 0, 0.29);
      cursor: pointer;
    }

    #toggleRailway:active {
      box-shadow: inset 0 0 2px rgba(128, 128, 128, 0.1);
      transform: translateY(2px);
    }

    #markerSearch {
      border: solid 1px #000;
      border-left: solid 6px #ff7c5c;
      color: #ff7c5c;
      width: 90vw;
      padding: 6px;
      margin: 6px;
    }

    #searchResults {
      position:absolute;
      z-index: 10000;
      list-style: none;
      margin: 4px 0 0;
      padding: 0;
      background: white;
      border: 1px solid #ccc;
      max-height: 200px;
      overflow-y: auto;
    }

    #searchResults li {
      padding: 4px 8px;
      cursor: pointer;
    }

    #searchResults li:hover {
      background: #eee;
    }

    .railway-line {
      stroke-dasharray: 0.1 7;
      stroke-width: 5;
    }

    .icon1 { width: 20px !important; height: 20px !important; border-radius: 10px; border: 3px solid #fdfdfd; box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8); background-color: rgb(255, 150, 157); }
    .icon2 { width: 20px !important; height: 20px !important; border-radius: 10px; border: 3px solid #fdfdfd; box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8); background-color: rgb(255, 0, 0); }
    .icon3 { width: 20px !important; height: 20px !important; border-radius: 10px; border: 3px solid #fdfdfd; box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8); background-color: rgb(255, 255, 255); }
    .icon4 { width: 20px !important; height: 20px !important; border-radius: 10px; border: 3px solid #fdfdfd; box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8); background-color: rgb(0, 255, 255); }
    .icon5 { width: 20px !important; height: 20px !important; border-radius: 10px; border: 3px solid #fdfdfd; box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8); background-color: rgb(255, 255, 0); }
    .icon6 { width: 20px !important; height: 20px !important; border-radius: 10px; border: 3px solid #fdfdfd; box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8); background-color: rgb(0, 0, 255); }
    .icon7 { width: 20px !important; height: 20px !important; border-radius: 10px; border: 3px solid #fdfdfd; box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8); background-color: rgb(255, 174, 0); }
    .icon8 { width: 20px !important; height: 20px !important; border-radius: 10px; border: 3px solid #fdfdfd; box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8); background-color: rgb(0, 255, 0); }
    .icon9 { width: 20px !important; height: 20px !important; border-radius: 10px; border: 3px solid #fdfdfd; box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8); background-color: rgb(206, 189, 112); }

    .leaflet-image-layer {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .leaflet-control-zoom {
      border: 2px solid #ff7c5c !important;
    }

    .leaflet-control-zoom-in {
      border-bottom: 1px solid #000 !important;
    }
  </style>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const VERSION = "?ver=3.0.0"

    // マイクラ座標 (X, Z) から Leaflet 用の LatLng [Lat, Lng] に変換する
    // マイクラの X(東西) は Leaflet の Lng に。マイクラの Z(南北) は Leaflet の Lat(※上下反転) に。
    function mcToLatLng(mcX, mcZ) {
      return [-mcZ, mcX];
    }

    // タイルのサイズを監視して安全に +1px するキャッシュ対策の残り
    function watchTileSize(tile) {
      let lastWidth = null;
      let lastHeight = null;
      const observer = new MutationObserver(() => {
        const w = parseFloat(tile.style.width);
        const h = parseFloat(tile.style.height);
        if (isNaN(w) || isNaN(h)) return;
        if (w === lastWidth && h === lastHeight) return;
        lastWidth = w;
        lastHeight = h;
        observer.disconnect();
        tile.style.width = (w + 1) + "px";
        tile.style.height = (h + 1) + "px";
        observer.observe(tile, { attributes: true, attributeFilter: ["style"] });
      });
      observer.observe(tile, { attributes: true, attributeFilter: ["style"] });
    }

    const tileObserver = new MutationObserver((mutations) => {
      for (const m of mutations) {
        for (const node of m.addedNodes) {
          if (node instanceof HTMLImageElement && node.classList.contains("leaflet-image-layer")) {
            watchTileSize(node);
          }
        }
      }
    });

    tileObserver.observe(document.body, { childList: true, subtree: true });

    // マップ初期化
    var map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: -3
    });

    var railwayLayer = L.layerGroup([]);
    var markersList = [];

    // JSONロード用ユーティリティ (キャッシュ対策付き)
    async function loadJson(url) {
      const res = await fetch(url + VERSION);
      return await res.json();
    }

    async function initializeMap() {
      try {
        const [settings, markersData, railwayData] = await Promise.all([
          loadJson("edit/Setting.json"),
          loadJson("markers.json"),
          loadJson("railway.json")
        ]);

        // 1. タイルを配置
        let globalMinX = Infinity, globalMaxX = -Infinity;
        let globalMinZ = Infinity, globalMaxZ = -Infinity;

        const loadAreas = settings.load_area || [];
        loadAreas.forEach(area => {
          let minX = area.x_min, maxX = area.x_max;
          let minZ = area.z_min, maxZ = area.z_max;

          if (minX < globalMinX) globalMinX = minX;
          if (maxX > globalMaxX) globalMaxX = maxX;
          if (minZ < globalMinZ) globalMinZ = minZ;
          if (maxZ > globalMaxZ) globalMaxZ = maxZ;

          let minAx = Math.floor(minX / 128);
          let maxAx = Math.floor(maxX / 128);
          let minAz = Math.floor(minZ / 128);
          let maxAz = Math.floor(maxZ / 128);

          for (let ax = minAx; ax <= maxAx; ax++) {
            for (let az = minAz; az <= maxAz; az++) {
              let url = `mapData/image/${ax}_${az}.png${VERSION}`;
              // bounds=[[South, West], [North, East]] = [[minLat, minLng], [maxLat, maxLng]]
              let bounds = [
                mcToLatLng((ax) * 128, (az + 1) * 128),     // SouthWest
                mcToLatLng((ax + 1) * 128, (az) * 128)      // NorthEast
              ];
              L.imageOverlay(url, bounds).addTo(map);
            }
          }
        });

        // トータル範囲は取得するが、初期表示は本拠点付近を中心に拡大して表示
        if (globalMinX !== Infinity) {
          map.setView(mcToLatLng(975, 590), 0); // 本拠点付近を少し拡大して表示
        }

        // 2. マーカーを配置
        function putMarker(data, mapObj) {
          var markerHTML = "";
          if (data.title) markerHTML += `<h2>${data.title}</h2>`;
          if (data.explane) markerHTML += `<p>${data.explane.replace(/\n/g, "<br>")}</p>`;
          markerHTML += `<p style="color: #666; font-size: 0.9em; margin-bottom: 8px;">📍 座標: ${data.x} ${data.y} ${data.z}</p>`;
          if (data.image) markerHTML += `<img style="width: 300px;" src="${data.image}${VERSION}">`;
          return L.marker(mcToLatLng(data.x, data.z)).addTo(mapObj).bindPopup(markerHTML);
        }

        markersData.forEach(element => {
          var marker = putMarker(element, map);
          markersList.push({
            ...element,
            latlng: mcToLatLng(element.x, element.z),
            marker: marker
          });
        });

        // 3. 路線を配置
        function drawRailway(points, name, color) {
          var latlngPoints = points.map(pt => mcToLatLng(pt[0], pt[1]));
          var polyline = L.polyline(latlngPoints, { color: color, className: "railway-line" }).addTo(railwayLayer);
          polyline.bindTooltip(name, {
            permanent: true,
            direction: 'center',
            className: 'railway-label'
          }).openTooltip();
        }

        if (railwayData.railways) {
          railwayData.railways.forEach(r => {
            drawRailway(r.points, r.name, r.color);
          });
        }

        // 4. 駅を配置
        function drawStation(point, name, cssClass, targetLayer) {
          var latlng = mcToLatLng(point[0], point[1]);
          var myIcon = L.divIcon({ className: cssClass, iconAnchor: [13, 13] });
          L.marker(latlng, { icon: myIcon }).addTo(targetLayer);
          L.tooltip({
            permanent: true,
            direction: 'right',
            className: 'station-label',
            offset: [10, 0]
          })
            .setContent(name)
            .setLatLng(latlng)
            .addTo(targetLayer);
        }

        if (railwayData.stations) {
          railwayData.stations.forEach(s => {
            drawStation([s.x, s.z], s.name, s.cssClass, railwayLayer);
          });
        }

        railwayLayer.addTo(map);

      } catch (e) {
        console.error("データの読み込みに失敗しました", e);
      }
    }

    initializeMap();

    // 検索とUIの処理
    var railwayVisible = true;
    document.getElementById('toggleRailway').addEventListener('click', function () {
      if (railwayVisible) {
        map.removeLayer(railwayLayer);
      } else {
        map.addLayer(railwayLayer);
      }
      railwayVisible = !railwayVisible;
    });

    const input = document.getElementById("markerSearch");
    const results = document.getElementById("searchResults");

    input.addEventListener("input", () => {
      const keyword = input.value.trim();
      results.innerHTML = "";
      if (keyword === "") return;

      markersList
        .filter(m => m.title.toLowerCase().includes(keyword.toLowerCase()))
        .forEach(m => {
          const li = document.createElement("li");
          li.textContent = m.title;

          li.addEventListener("click", () => {
            map.flyTo(m.latlng, map.getZoom(), { animate: true });
            m.marker.openPopup();
            results.innerHTML = "";
            input.value = "";
          });

          results.appendChild(li);
        });
    });
  </script>
</body>
</html>
